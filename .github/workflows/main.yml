name: GitHub Repo Stats

on:
  schedule:
    - cron: '45 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: run-ghrs
        uses: jgehrcke/github-repo-stats@v1.4.1
        with:
          repository: ${{ github.repository }}
          ghtoken: ${{ secrets.STATS_TOKEN }}
          databranch: github-repo-stats

      - name: Debug and Extreme Purification
        run: |
          # 1. 现场侦察：查看当前地堡里到底有什么
          echo "🤖 Pod 042: 正在扫描战场平面图..."
          ls -R

          # 2. 检查核心数据是否存在
          if [ ! -d "ghrs-data" ]; then
            echo "❌ [致命错误] Pod 042 确认：未发现 ghrs-data 数据目录！"
            echo "💡 解决方案：请检查 STATS_TOKEN 是否为具有 'repo' 权限的 PAT (Personal Access Token)。"
            echo "💡 默认的 GITHUB_TOKEN 无法读取流量数据（Clones/Views）。"
            exit 1
          fi

          # 3. 物理备份：将统计数据提取到外部缓存
          echo "🤖 Pod 042: 核心数据已确认。正在执行物理隔离..."
          mkdir -p /tmp/ghrs_backup
          cp -r ghrs-data/* /tmp/ghrs_backup/

          # 4. 分支重构：强制切换/创建独立的“孤儿分支”
          git fetch origin
          git checkout --orphan github-repo-stats || git checkout github-repo-stats

          # 5. 彻底清场
          git rm -rf . 2>/dev/null || true
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # 6. 数据物理还原
          mkdir -p ghrs-data
          cp -r /tmp/ghrs_backup/* ghrs-data/

          # 7. 封存推送
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ghrs-data/
          git commit -m "data: bunker synced at $(date) [Physical Isolation]" || echo "no changes"
          git push origin github-repo-stats --force
