name: Bunker Sovereign Intelligence (v8.0)

on:
  schedule:
    - cron: '45 19 * * *' 
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  recon-and-ledger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Data Branch
        uses: actions/checkout@v4
        with:
          ref: github-repo-stats
          token: ${{ secrets.STATS_TOKEN }}
          fetch-depth: 0

      - name: Setup Plotting Environment
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pandas seaborn scipy numpy

      # 2. 全频道数据搜刮协议 (含去垢焊接逻辑)
      - name: Full Spectrum Data Mining
        run: |
          echo "🤖 Pod 042: 启动‘全领域信号搜刮协议’..."
          AUTH="-H 'Authorization: token ${{ secrets.STATS_TOKEN }}' -H 'Accept: application/vnd.github.v3+json'"
          API="https://api.github.com/repos/${{ github.repository }}"
          
          eval curl -s $AUTH $API/traffic/clones > raw_clones.json
          eval curl -s $AUTH $API/traffic/popular/referrers > raw_referrers.json
          eval curl -s $AUTH $API/traffic/views > raw_views.json
          eval curl -s $AUTH $API > raw_repo.json

          mkdir -p ghrs-data
          # 物理清洗与焊接 (Clones & Views)
          clean_merge() {
            if [ ! -f "$1" ]; then cp "$2" "$1";
            else (tail -n +2 "$1"; tail -n +2 "$2") | grep -v "date" | sed 's/\//-/g' | awk -F',' '!a[$1]++' | sort -r > tmp.csv
            echo "date,$3,uniques" > "$1"; cat tmp.csv >> "$1"; fi
          }
          
          echo "date,clones,uniques" > /tmp/nc.csv && jq -r '.clones[] | "\(.timestamp[0:10]),\(.count),\(.uniques)"' raw_clones.json >> /tmp/nc.csv
          clean_merge "ghrs-data/clones_ledger.csv" "/tmp/nc.csv" "clones"
          
          echo "date,views,uniques" > /tmp/nv.csv && jq -r '.views[] | "\(.timestamp[0:10]),\(.count),\(.uniques)"' raw_views.json >> /tmp/nv.csv
          clean_merge "ghrs-data/views_ledger.csv" "/tmp/nv.csv" "views"

          # 战绩结算
          TOTAL_CLONES=$(grep -v "date" "ghrs-data/clones_ledger.csv" | awk -F',' '{sum+=$2} END {print sum}')
          STARS=$(jq '.stargazers_count // 0' raw_repo.json)
          FORKS=$(jq '.forks_count // 0' raw_repo.json)
          SAVED_HOURS=$((TOTAL_CLONES * 2)) 
          jq -n --arg tc "$TOTAL_CLONES" --arg sh "$SAVED_HOURS" --arg st "$STARS" --arg fk "$FORKS" \
            '{total_clones: ($tc|tonumber), saved_hours: ($sh|tonumber), stars: ($st|tonumber), forks: ($fk|tonumber)}' > bunker-stats.json

      # 3. 🧬 【地堡 8.0 核心】：三位一体可视化构筑 (原版 + Kimi 高阶版)
      - name: Construct Integrated Visual Dashboards
        run: |
          echo "🤖 Pod 042: 执行‘全量视觉资产重构协议’..."
          python3 <<EOF
          import pandas as pd
          import matplotlib.pyplot as plt
          import seaborn as sns
          import os

          def load_clean(path, col):
              df = pd.read_csv(path)
              df['date'] = pd.to_datetime(df['date'], errors='coerce')
              df = df.dropna(subset=['date'])
              df[col] = pd.to_numeric(df[col.lower()], errors='coerce').fillna(0)
              return df[['date', col]]

          df = pd.merge(load_clean('ghrs-data/clones_ledger.csv', 'Clones'), load_clean('ghrs-data/views_ledger.csv', 'Views'), on='date', how='outer').fillna(0).sort_values('date')
          df['cumulative'] = df['Clones'].cumsum()
          plt.style.use('dark_background')
          os.makedirs('plots', exist_ok=True)

          # --- 看板 1: 原版 V7 核心看板 (保持传统荣光) ---
          fig1 = plt.figure(figsize=(12, 10))
          gs1 = fig1.add_gridspec(3, 1)
          ax1 = fig1.add_subplot(gs1[0]); ax1.plot(df['date'].tail(30), df['Views'].tail(30), alpha=0.5, ls='--'); ax1.plot(df['date'].tail(30), df['Clones'].tail(30), color='#33cc33', lw=2); ax1.set_title('Recon: Views vs Clones (30D)')
          ax2 = fig1.add_subplot(gs1[1]); ax2.fill_between(df['date'], df['cumulative'], color='#0066ff', alpha=0.2); ax2.plot(df['date'], df['cumulative'], color='#0066ff', lw=3); ax2.set_title('Bunker Glory: Cumulative Clones')
          ax3 = fig1.add_subplot(gs1[2]); pivot = df.assign(week=df['date'].dt.isocalendar().week, day=df['date'].dt.day_name()).pivot_table(index='day', columns='week', values='Clones', aggfunc='sum').fillna(0).reindex(['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'])
          sns.heatmap(pivot, cmap='Greens', ax=ax3, cbar=False, lw=2, linecolor='#1a1a1a'); ax3.set_title('Global Deployment Heatmap')
          plt.tight_layout(); plt.savefig('plots/bunker_main_v7.png', dpi=120)

          # --- 看板 2: Kimi 风格高阶分析 (数据深潜) ---
          fig2, axes = plt.subplots(2, 2, figsize=(16, 12))
          sns.regplot(data=df, x='Views', y='Clones', ax=axes[0,0], color='#0066ff'); axes[0,0].set_title('Correlation Analysis')
          sns.histplot(df['Clones']/df['Views'].replace(0,1), bins=15, ax=axes[0,1], kde=True, color='#ff9900'); axes[0,1].set_title('Clones Per Visitor Distribution')
          df.assign(W=df['date'].dt.strftime('%Y-W%U')).groupby('W')['Clones'].sum().tail(10).plot(kind='bar', ax=axes[1,0], color='#33cc33'); axes[1,0].set_title('Weekly Performance')
          df.set_index('date')['Clones'].rolling(7).mean().plot(ax=axes[1,1], color='#33cc33'); axes[1,1].set_title('7-Day Moving Average')
          plt.tight_layout(); plt.savefig('plots/bunker_advanced_intel.png', dpi=100)
          EOF

      # 4. [报表装修]
      - name: Assemble Sovereignty Report
        run: |
          STATS="bunker-stats.json"
          echo "# 🛰️ 地堡终极运行报告 (Sovereign Dashboard)" > README.md
          echo "## 📊 核心战力指标" >> README.md
          echo "- **物理克隆总计**: \`$(jq '.total_clones' $STATS)\` 次" >> README.md
          echo "- **物理抢救工时**: \`$(jq '.saved_hours' $STATS)\` 小时 (低调算法: 2h/Page)" >> README.md
          echo "- **社群声望**: ⭐ \`$(jq '.stars' $STATS)\` / 🍴 \`$(jq '.forks' $STATS)\`" >> README.md
          echo "" >> README.md
          echo "### 🖥️ 实时作战看板 (Visual Radar)" >> README.md
          echo "![Main](./plots/bunker_main_v7.png)" >> README.md
          echo "### 🔍 战略深度审计 (Advanced Intelligence)" >> README.md
          echo "![Intel](./plots/bunker_advanced_intel.png)" >> README.md
          echo "#### 📡 流量来源实时追踪" >> README.md
          echo "| 来源站点 | 访问量 | 独立指挥官 |" >> README.md
          echo "| :--- | :--- | :--- |" >> README.md
          [ -s raw_referrers.json ] && jq -r '.[] | "| \(.referrer) | \(.count) | \(.uniques) |"' raw_referrers.json >> README.md || echo "| 信号屏蔽中 | - | - |" >> README.md
          echo -e "\n> 📡 物理封存点: $(date +'%Y-%m-%d %H:%M:%S') CST | Glory to Mankind." >> README.md

      # 5. 最终物理封存
      - name: Final Sealing
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          TOTAL=$(jq '.total_clones' bunker-stats.json)
          git commit -m "chore: sovereign update v8.0 - mega dashboard [total $TOTAL]" || echo "no changes"
          git push origin github-repo-stats --force
