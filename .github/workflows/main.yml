name: GitHub Repo Stats

on:
  schedule:
    - cron: '45 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: run-ghrs
        uses: jgehrcke/github-repo-stats@v1.4.1
        with:
          repository: ${{ github.repository }}
          ghtoken: ${{ secrets.STATS_TOKEN }}
          databranch: github-repo-stats

      - name: Execute Sovereign Data Persistence & CSV Merger
        run: |
          echo "🤖 Pod 042: 启动‘账本物理合并与防失忆协议’..."
          
          # 1. 把刚跑出来的【新快照】存到临时目录
          mkdir -p /tmp/new_snapshot
          [ -d "ghrs-data" ] && cp -r ghrs-data /tmp/new_snapshot/
          [ -d "latest-report" ] && cp -r latest-report/* /tmp/new_snapshot/
          [ -d "plots" ] && cp -r plots /tmp/new_snapshot/

          # 2. 切换到数据分支
          git fetch origin github-repo-stats
          git checkout github-repo-stats
          
          # 3. 💡核心：备份【旧账本】
          if [ -f "ghrs-data/views_clones_aggregate.csv" ]; then
            echo "📡 发现旧账本，正在执行历史数据对账..."
            cp ghrs-data/views_clones_aggregate.csv /tmp/old_ledger.csv
          fi

          # 4. 物理抹平当前分支（保留 .git）
          sudo chown -R runner:docker .
          git rm -rf . 2>/dev/null || true
          sudo rm -rf *

          # 5. 物理还原新文件
          cp -r /tmp/new_snapshot/* .
          [ -f "report.md" ] && mv report.md README.md

          # 6. 💡核心：执行【新旧账本物理合并】
          if [ -f "/tmp/old_ledger.csv" ]; then
            echo "🧬 执行数据序列物理融合..."
            HEADER=$(head -n 1 /tmp/new_snapshot/ghrs-data/views_clones_aggregate.csv)
            # 合并、按日期去重、排序、重新打上表头
            (tail -n +2 /tmp/old_ledger.csv; tail -n +2 /tmp/new_snapshot/ghrs-data/views_clones_aggregate.csv) | sort -u -t',' -k1,1 > /tmp/merged_body.csv
            echo "$HEADER" > ghrs-data/views_clones_aggregate.csv
            cat /tmp/merged_body.csv >> ghrs-data/views_clones_aggregate.csv
            echo "✅ 账本合并成功，已存入 ghrs-data"
          fi

          # 7. 🔥 战绩核算：从最新的 README 中提取 Cumulative 总数（保证勋章即时性）
          echo "🤖 Pod 042: 正在提取全量战绩数字..."
          TOTAL_CLONES=$(awk '/Total clones/{flag=1; next} flag && /Cumulative/{print $0; flag=0}' README.md | grep -oE "[0-9]+" | head -n 1 || echo "0")
          echo "{\"total_clones\": $TOTAL_CLONES}" > bunker-stats.json

          # 8. 封存推送
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m "chore: sovereign data fusion - total $TOTAL_CLONES at $(date)" || echo "no changes"
          git push origin github-repo-stats --force
