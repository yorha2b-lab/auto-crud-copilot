name: GitHub Repo Stats

on:
  schedule:
    # 每天凌晨 0 点（UTC 时间）运行一次
    - cron: '0 0 * * *'
  # 支持手动触发，方便你现在测试
  workflow_dispatch:

jobs:
  run-stats:
    runs-on: ubuntu-latest
    steps:
      - name: run-ghrs
        uses: jgehrcke/github-repo-stats@v1.4.1
        with:
          # 这里填你的仓库名，格式为 "用户名/仓库名"
          repository: ${{ github.repository }}
          # 使用我们刚才设置的 Secret
          ghtoken: ${{ secrets.STATS_TOKEN }}
