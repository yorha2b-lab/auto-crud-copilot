name: GitHub Repo Stats

on:
  schedule:
    - cron: '45 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: run-ghrs
        uses: jgehrcke/github-repo-stats@v1.4.1
        with:
          repository: ${{ github.repository }}
          ghtoken: ${{ secrets.STATS_TOKEN }}
          databranch: github-repo-stats

      - name: Update Bunker Database (No Garbage README)
        run: |
          git fetch origin github-repo-stats
          git checkout github-repo-stats

          # 1. 物理隔离：确保核心数据库 ghrs-data 绝对安全
          mkdir -p ../temp_data
          if [ -d "ghrs-data" ]; then cp -r ghrs-data ../temp_data/; fi

          # 2. 彻底清场：删除该分支下所有文件（包括那个乱码的 README.md 和 report.md）
          sudo rm -rf *
          
          # 3. 还原核心数据
          if [ -d "../temp_data/ghrs-data" ]; then cp -r ../temp_data/ghrs-data . ; fi

          # 4. 执行封存推送
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ghrs-data/
          git commit -m "data: bunker synced - total clones updated" || echo "no changes"
          git push origin github-repo-stats --force
