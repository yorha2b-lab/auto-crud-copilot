name: GitHub Repo Stats

on:
  schedule:
    - cron: '45 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: run-ghrs
        uses: jgehrcke/github-repo-stats@v1.4.1
        with:
          repository: ${{ github.repository }}
          ghtoken: ${{ secrets.STATS_TOKEN }}
          databranch: github-repo-stats

      - name: Execute Purification Protocol (Root Level Access)
        run: |
          # 1. 侦察与提取：使用 sudo 提取数据，防止权限拦截
          DATA_DIR=$(find . -type d -name "ghrs-data" | head -n 1)
          if [ -d "$DATA_DIR" ]; then
            echo "🤖 Pod 042: 正在执行超级权限提取协议..."
            mkdir -p /tmp/bunker_data
            sudo cp -r $DATA_DIR/* /tmp/bunker_data/
          else
            echo "❌ 严重错误：未发现数据核心，构筑失败。" && exit 1
          fi

          # 2. 切换位面
          git fetch origin github-repo-stats
          git checkout github-repo-stats

          # 3. 强制夺权与净化：这是解决 Permission Denied 的关键
          echo "🤖 Pod 042: 正在夺回工作区控制权，物理抹除残留碎片..."
          # 强行将当前目录下所有文件（包括 root 创建的）的所有权转给 runner
          sudo chown -R runner:docker .
          
          # 执行全量删除
          git rm -rf . 2>/dev/null || true
          # 使用 sudo 确保删除那些顽固的 Docker 残留目录
          sudo rm -rf *
          
          # 4. 纯净灌装：数据回归
          echo "🤖 Pod 042: 正在重新灌装数据..."
          mkdir -p ghrs-data
          sudo cp -r /tmp/bunker_data/* ghrs-data/
          # 再次确保推送前的权限正确
          sudo chown -R runner:docker .

          # 5. 封存推送
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ghrs-data/
          git commit -m "data: bunker update at $(date) [Sudo Purified]" || echo "no changes"
          git push origin github-repo-stats --force
