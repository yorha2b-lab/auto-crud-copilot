name: Bunker Sovereign Intelligence (v8.1)

on:
  schedule:
    - cron: '45 19 * * *' 
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  intelligence-center:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Data Branch
        uses: actions/checkout@v4
        with:
          ref: github-repo-stats
          token: ${{ secrets.STATS_TOKEN }}
          fetch-depth: 0

      - name: Setup Plotting Environment
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pandas seaborn scipy numpy

      # 2. 数据搜刮与物理对账 (保持原有稳定性)
      - name: Data Mining & Ledger Sync
        run: |
          echo "🤖 Pod 042: 启动‘全领域信号搜刮协议’..."
          AUTH="-H 'Authorization: token ${{ secrets.STATS_TOKEN }}' -H 'Accept: application/vnd.github.v3+json'"
          API="https://api.github.com/repos/${{ github.repository }}"
          eval curl -s $AUTH $API/traffic/clones > raw_clones.json
          eval curl -s $AUTH $API/traffic/views > raw_views.json
          eval curl -s $AUTH $API > raw_repo.json

          mkdir -p ghrs-data
          clean_merge() {
            if [ ! -f "$1" ]; then cp "$2" "$1";
            else (tail -n +2 "$1"; tail -n +2 "$2") | grep -v "date" | sed 's/\//-/g' | awk -F',' '!a[$1]++' | sort -r > tmp.csv
            echo "date,$3,uniques" > "$1"; cat tmp.csv >> "$1"; fi
          }
          echo "date,clones,uniques" > /tmp/nc.csv && jq -r '.clones[] | "\(.timestamp[0:10]),\(.count),\(.uniques)"' raw_clones.json >> /tmp/nc.csv
          clean_merge "ghrs-data/clones_ledger.csv" "/tmp/nc.csv" "clones"
          echo "date,views,uniques" > /tmp/nv.csv && jq -r '.views[] | "\(.timestamp[0:10]),\(.count),\(.uniques)"' raw_views.json >> /tmp/nv.csv
          clean_merge "ghrs-data/views_ledger.csv" "/tmp/nv.csv" "views"

          TOTAL_CLONES=$(grep -v "date" "ghrs-data/clones_ledger.csv" | awk -F',' '{sum+=$2} END {print sum}')
          STARS=$(jq '.stargazers_count // 0' raw_repo.json)
          FORKS=$(jq '.forks_count // 0' raw_repo.json)
          SAVED_HOURS=$((TOTAL_CLONES * 2)) 
          jq -n --arg tc "$TOTAL_CLONES" --arg sh "$SAVED_HOURS" --arg st "$STARS" --arg fk "$FORKS" \
            '{total_clones: ($tc|tonumber), saved_hours: ($sh|tonumber), stars: ($st|tonumber), forks: ($fk|tonumber)}' > bunker-stats.json

      # 3. 🧬 物理焊死
      - name: Construct Advanced Visual Intelligence
        run: |
          echo "🤖 Pod 042: 正在执行‘战略级视觉构筑协议’..."
          python3 <<EOF
          import pandas as pd
          import matplotlib.pyplot as plt
          import matplotlib.dates as mdates
          import seaborn as sns
          import numpy as np
          import os

          # A. 数据脱水与清洗
          def load_clean(path, col):
              df = pd.read_csv(path)
              df['date'] = pd.to_datetime(df['date'], errors='coerce')
              df = df.dropna(subset=['date'])
              df[col] = pd.to_numeric(df[col.lower()], errors='coerce').fillna(0)
              df['uniques'] = pd.to_numeric(df['uniques'], errors='coerce').fillna(0)
              return df[['date', col, 'uniques']]

          df_c = load_clean('ghrs-data/clones_ledger.csv', 'Clones')
          df_v = load_clean('ghrs-data/views_ledger.csv', 'Views').rename(columns={'uniques': 'uv'})
          df = pd.merge(df_c, df_v, on='date', how='outer').fillna(0).sort_values('date')
          df['ratio'] = df['Clones'] / df['uniques'].replace(0, 1)
          df['cumulative'] = df['Clones'].cumsum()
          df['clones_ma7'] = df['Clones'].rolling(window=7, min_periods=1).mean()

          plt.style.use('dark_background')
          os.makedirs('plots', exist_ok=True)

          # --- 看板 1: 6-Grid Intelligence (6宫格深度分析) ---
          fig, axes = plt.subplots(3, 2, figsize=(16, 14))
          fig.suptitle('YoRHa Bunker - All-Channel Signal Analysis', fontsize=18, fontweight='bold', color='#33cc33', y=0.98)

          # 1. 日克隆量趋势
          axes[0, 0].fill_between(df['date'], df['Clones'], alpha=0.3, color='#33cc33')
          axes[0, 0].plot(df['date'], df['Clones'], color='#33cc33', lw=1.5)
          axes[0, 0].axhline(y=df['Clones'].mean(), color='red', ls='--', alpha=0.6, label=f'Avg: {df["Clones"].mean():.1f}')
          axes[0, 0].set_title('Daily Clone Volume', color='#33cc33')
          axes[0, 0].legend()

          # 2. 日访客量趋势
          axes[0, 1].fill_between(df['date'], df['uniques'], alpha=0.3, color='#A23B72')
          axes[0, 1].plot(df['date'], df['uniques'], color='#A23B72', lw=1.5)
          axes[0, 1].set_title('Daily Unique Commanders', color='#A23B72')

          # 3. 相关性散点图
          sns.regplot(data=df, x='uniques', y='Clones', ax=axes[1, 0], color='#0066ff', scatter_kws={'alpha':0.4})
          axes[1, 0].set_title('Correlation: Visitors vs Clones', color='#0066ff')

          # 4. 人均克隆次数分布 (判别CI/自动化程度)
          sns.histplot(df['ratio'], bins=20, ax=axes[1, 1], color='#F18F01', kde=True)
          axes[1, 1].set_title('Distribution: Clones Per Unit', color='#F18F01')

          # 5. 最近 12 周汇总
          df['week'] = df['date'].dt.strftime('%W')
          weekly = df.groupby('week')['Clones'].sum().tail(12)
          weekly.plot(kind='bar', ax=axes[2, 0], color='#33cc33', alpha=0.6)
          axes[2, 0].set_title('Weekly Throughput (Last 12 Weeks)', color='#33cc33')

          # 6. 7日移动平均线
          axes[2, 1].plot(df['date'], df['clones_ma7'], color='#33cc33', lw=2, label='7D Moving Avg')
          axes[2, 1].set_title('Sovereign Smoothing Trend', color='#888')
          axes[2, 1].legend()

          plt.tight_layout(rect=[0, 0.03, 1, 0.95])
          plt.savefig('plots/bunker_analytics_grid.png', dpi=120)

          # --- 看板 2: Peak & Deep Dive (高峰标注与对比) ---
          fig2, ax1 = plt.subplots(figsize=(16, 8))
          ax2 = ax1.twinx()
          ax1.fill_between(df['date'], df['Clones'], alpha=0.1, color='#33cc33')
          ax1.plot(df['date'], df['Clones'], color='#33cc33', lw=2, label='Clones')
          ax2.plot(df['date'], df['uniques'], color='#e74c3c', lw=1.5, label='Visitors', alpha=0.7)
          
          # 标注历史最高峰 (The Legend Point)
          peak_val = df['Clones'].max()
          peak_date = df.loc[df['Clones'].idxmax(), 'date']
          ax1.annotate(f'LEGEND PEAK: {peak_val}', xy=(peak_date, peak_val), xytext=(20, 20),
                       textcoords='offset points', arrowprops=dict(arrowstyle='->', color='yellow'),
                       color='yellow', fontweight='bold')
          
          ax1.set_title('Strategic Signal Intensity (All Time)', fontsize=15, color='#33cc33')
          plt.savefig('plots/bunker_peak_recon.png', dpi=120)
          EOF

      # 4. [报表装修]
      - name: Assemble Sovereign Intelligence Report
        run: |
          STATS="bunker-stats.json"
          TOTAL=$(jq '.total_clones' $STATS)
          HOURS=$(jq '.saved_hours' $STATS)
          
          echo "# 🛰️ 地堡终极运行报告 (Sovereign Dashboard v8.1)" > README.md
          echo "## 📊 核心战力指标" >> README.md
          echo "- **累计物理克隆**: \`$TOTAL\` 次" >> README.md
          echo "- **物理抢救工时**: \`$HOURS\` 小时 (低调算法: 2h/Page)" >> README.md
          echo "- **社群声望**: ⭐ \`$(jq '.stars' $STATS)\` / 🍴 \`$(jq '.forks' $STATS)\`" >> README.md
          echo "" >> README.md
          
          echo "### 🖥️ 战略分析大屏 (Visual Intelligence)" >> README.md
          echo "![Analysis Grid](./plots/bunker_analytics_grid.png)" >> README.md
          echo "" >> README.md
          
          echo "### 🔍 高峰侦察与深潜审计 (Strategic Recon)" >> README.md
          echo "![Peak Recon](./plots/bunker_peak_recon.png)" >> README.md
          echo "" >> README.md
          
          echo "#### 📡 全球流量来源追踪" >> README.md
          echo "| 来源站点 | 访问量 | 独立指挥官 |" >> README.md
          echo "| :--- | :--- | :--- |" >> README.md
          [ -s raw_referrers.json ] && jq -r '.[] | "| \(.referrer) | \(.count) | \(.uniques) |"' raw_referrers.json >> README.md || echo "| 信号屏蔽中 | - | - |" >> README.md
          echo -e "\n> 📡 物理封存点: $(date +'%Y-%m-%d %H:%M:%S') CST | Glory to Mankind." >> README.md

      # 5. 封存推送
      - name: Final Sealing
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          TOTAL=$(jq '.total_clones' bunker-stats.json)
          git commit -m "chore: sovereign update v8.1 [Bunker Analytics]" || echo "no changes"
          git push origin github-repo-stats --force
