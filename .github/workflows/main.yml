name: GitHub Repo Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 注意：这里我们删掉了所有的 checkout 步骤！
      # 我们不下载代码，直接空手套白狼。
      - name: run-ghrs
        uses: jgehrcke/github-repo-stats@v1.4.1
        with:
          repository: ${{ github.repository }}
          ghtoken: ${{ secrets.STATS_TOKEN }}
          # 换回你最开始想要的名字，这次它绝对干干净净
          databranch: github-repo-stats
