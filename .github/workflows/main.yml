name: GitHub Repo Stats

on:
  schedule:
    - cron: '45 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: run-ghrs
        uses: jgehrcke/github-repo-stats@v1.4.1
        with:
          repository: ${{ github.repository }}
          ghtoken: ${{ secrets.STATS_TOKEN }}
          databranch: github-repo-stats

      - name: Execute Black-Box Data Fusion
        run: |
          echo "🤖 Pod 042: 启动‘黑盒数据采集与物理焊接协议’..."
          
          # 1. 建立临时基站，存储刚抓到的【新快照】
          mkdir -p /tmp/new_snapshot
          NEW_CSV=$(find . -name "views_clones_aggregate.csv" | head -n 1)
          NEW_MD=$(find . -name "report.md" | head -n 1)
          NEW_PLOTS=$(find . -type d -name "plots" | head -n 1)
          
          [ ! -z "$NEW_CSV" ] && cp "$NEW_CSV" /tmp/new_snapshot/new_ledger.csv
          [ ! -z "$NEW_MD" ] && cp "$NEW_MD" /tmp/new_snapshot/report.md
          [ ! -z "$NEW_PLOTS" ] && cp -r "$NEW_PLOTS" /tmp/new_snapshot/

          # 2. ⚡【黑客入侵】：直接从 GitHub 物理地址抓取【旧账本】
          echo "📡 正在绕过本地缓存，从云端镜像抓取历史数据..."
          curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/github-repo-stats/ghrs-data/views_clones_aggregate.csv" -o /tmp/old_ledger.csv || echo "no_old_data"
          curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/github-repo-stats/bunker-stats.json" -o /tmp/old_stats.json || echo "no_old_json"

          # 3. 切换并彻底净化数据分支
          git fetch origin github-repo-stats
          git checkout github-repo-stats
          sudo rm -rf *
          mkdir -p ghrs-data

          # 4. 🧬【物理焊接】：强制合并新旧账本
          if [ -f "/tmp/old_ledger.csv" ] && [ "$(head -n 1 /tmp/old_ledger.csv)" != "no_old_data" ]; then
            echo "🧬 执行新旧序列合并逻辑..."
            HEADER=$(head -n 1 /tmp/new_snapshot/new_ledger.csv)
            # 合并、按日期去重、排序
            (tail -n +2 /tmp/old_ledger.csv; tail -n +2 /tmp/new_snapshot/new_ledger.csv) | sort -u -t',' -k1,1 > /tmp/final_body.csv
            echo "$HEADER" > ghrs-data/views_clones_aggregate.csv
            cat /tmp/final_body.csv >> ghrs-data/views_clones_aggregate.csv
            echo "✅ 历史账本已成功物理焊接！"
          else
            cp /tmp/new_snapshot/new_ledger.csv ghrs-data/views_clones_aggregate.csv
            echo "⚠️ 未发现历史账本，已初始化新序列。"
          fi

          # 5. 物理还原展示层
          cp /tmp/new_snapshot/report.md README.md
          [ -d "/tmp/new_snapshot/plots" ] && cp -r /tmp/new_snapshot/plots .

          # 6. 🔥【战绩重算】：提取当前全量战绩数字
          echo "🤖 Pod 042: 正在核算最终勋章数字..."
          TOTAL_CLONES=$(awk '/Total clones/{flag=1; next} flag && /Cumulative/{print $0; flag=0}' README.md | grep -oE "[0-9]+" | head -n 1 || echo "0")
          
          # 读取旧 JSON 的数字并对比（双保险）
          OLD_TOTAL=$(grep -oE "[0-9]+" /tmp/old_stats.json | head -n 1 || echo "0")
          if [ "$TOTAL_CLONES" -lt "$OLD_TOTAL" ]; then TOTAL_CLONES=$OLD_TOTAL; fi
          
          echo "{\"total_clones\": $TOTAL_CLONES}" > bunker-stats.json
          echo "✅ 最终总克隆数封存：$TOTAL_CLONES"

          # 7. 封存推送
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m "chore: sovereign ledger fusion - total $TOTAL_CLONES" || echo "no changes"
          git push origin github-repo-stats --force
