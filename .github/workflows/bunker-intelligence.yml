name: Bunker Sovereign Intelligence (v8.5)

on:
  schedule:
    - cron: '45 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
  REPO: ${{ github.repository }}

jobs:
  bunker-operation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Data Branch
        uses: actions/checkout@v4
        with:
          ref: github-repo-stats
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install matplotlib pandas seaborn scipy numpy requests

      # 💡 模块化执行流
      - name: 🛰️ Step 1: Data Collection & Ledger Fusion
        run: python .github/scripts/collect/traffic.py

      - name: 📈 Step 2: Visualization Rendering
        run: python .github/scripts/render/dashboard.py

      - name: 💾 Step 3: Deployment & Sealing
        run: python .github/scripts/deploy/publish.py